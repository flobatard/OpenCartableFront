<header class="header">
  <a [routerLink]="['/', language.lang(), 'home']" class="header__brand">
    <img
      class="header__logo header__logo--light"
      src="opencartable-logo-horizontal.svg"
      alt="OpenCartable"
      height="32"
    />
    <img
      class="header__logo header__logo--dark"
      src="opencartable-logo-horizontal-dark.svg"
      alt="OpenCartable"
      height="32"
    />
  </a>

  <div class="header__actions">
    <div class="header__langs" role="group" [attr.aria-label]="'header.language' | transloco">
      @for (lang of langs; track lang) {
        <button
          type="button"
          class="btn btn--ghost header__lang"
          [class.header__lang--active]="language.lang() === lang"
          [attr.aria-pressed]="language.lang() === lang"
          (click)="language.switchTo(lang)"
        >
          {{ lang.toUpperCase() }}
        </button>
      }
    </div>

    <button
      type="button"
      class="btn btn--ghost header__theme"
      (click)="theme.toggle()"
      [attr.aria-label]="
        (theme.theme() === 'dark' ? 'header.themeToggleDark' : 'header.themeToggle') | transloco
      "
    >
      @if (theme.theme() === 'dark') {
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" />
        </svg>
      }
    </button>

    @if (auth.isAuthenticated()) {
      <app-user-menu />
    } @else {
      <button type="button" class="btn btn--secondary" (click)="login()">
        {{ 'header.login' | transloco }}
      </button>
    }
  </div>
</header>
