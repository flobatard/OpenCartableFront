@if (isBrowser) {
  <div class="markdown-editor__frame">
    <ngx-monaco-editor [options]="editorOptions" [formControl]="inner" (onInit)="onEditorInit($event)" />
    @if (!ready()) {
      <div class="markdown-editor__loading">
        <app-spinner size="lg" />
      </div>
    }
  </div>
} @else {
  <div class="markdown-editor__placeholder" aria-hidden="true"></div>
}
