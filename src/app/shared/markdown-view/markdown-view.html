@if (isBrowser && markdown().trim() && (showPrint() || (showSettings() && courseId()))) {
  <div class="markdown-view__actions">
    @if (showSettings() && courseId()) {
      <button
        type="button"
        class="markdown-view__action"
        [attr.aria-label]="'courseStyle.trigger' | transloco"
        [title]="'courseStyle.trigger' | transloco"
        (click)="openStyle()"
      >
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="4 7 4 4 20 4 20 7" />
          <line x1="9" y1="20" x2="15" y2="20" />
          <line x1="12" y1="4" x2="12" y2="20" />
        </svg>
      </button>
    }
    @if (showPrint()) {
      <button
        type="button"
        class="markdown-view__action"
        [attr.aria-label]="'markdownView.print' | transloco"
        [title]="'markdownView.print' | transloco"
        (click)="print()"
      >
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="6 9 6 2 18 2 18 9" />
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
          <rect x="6" y="14" width="12" height="8" />
        </svg>
      </button>
    }
  </div>
}
<div
  #content
  class="course-content markdown-view__content"
  [style]="courseId() ? courseStyle.styleVars() : null"
  [innerHTML]="html()"
></div>
@if (isBrowser && showSettings() && courseId()) {
  <app-course-style-dialog />
}
